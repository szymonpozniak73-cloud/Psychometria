<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Psychometria - Strefa wiedzy</title>
  <!-- Podpięcie wspólnego pliku z wyglądem -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Tu wczyta się menu z pliku header.html -->
  <div id="wspolny-naglowek"></div>

  <!-- Główna treść strony głównej -->
  <main>
    <h1>Spis treści</h1>
    <p>Witaj w przestrzeni, gdzie tłumaczę psychometrię prostym językiem. Wybierz interesujący Cię temat:</p>
    
    <ul style="margin-top: 20px; padding-left: 20px; line-height: 2;">
      <li>
        <a href="artykul.html?id=co-to-jest-psychometria" style="color: #0056b3; font-weight: bold; text-decoration: none;">
          1. Podstawy: Co to w ogóle jest psychometria?
        </a>
      </li>
    </ul>
  </main>

  <!-- Tu wczyta się stopka z pliku footer.html -->
  <div id="wspolna-stopka"></div>

  <!-- Skrypt pobierający menu i stopkę -->
  <script>
    // Ładowanie nagłówka
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('wspolny-naglowek').innerHTML = data;
      });

    // Ładowanie stopki
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('wspolna-stopka').innerHTML = data;
      });
  </script>

</body>
</html>
