<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Psychometria - Strona Główna</title>
  <!-- Podpięcie wspólnego pliku z wyglądem -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Tu wczyta się menu z pliku header.html -->
  <div id="wspolny-naglowek"></div>

  <!-- Główna treść strony głównej -->
  <main>
    <h1>Witaj na stronie głównej!</h1>
    <p>Wybierz zakładkę z menu w lewym górnym rogu (ikona trzech kresek), aby przejść do materiałów dydaktycznych lub opisów projektów badawczych.</p>
  </main>

  <!-- Skrypt pobierający menu -->
  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('wspolny-naglowek').innerHTML = data;
      });
  </script>

</body>
</html>
