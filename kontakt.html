<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Psychometria - Kontakt</title>
  <!-- Podpięcie wspólnego pliku z wyglądem -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Tu wczyta się menu z pliku header.html -->
  <div id="wspolny-naglowek"></div>

  <!-- Główna treść danej podstrony -->
  <main>
    <h1>Kontakt</h1>
    <p>mail: s.pozniak@wns.uz.zgora.pl</p>
    </div>
  </main>

  <!-- Tu wczyta się stopka z pliku footer.html -->
  <div id="wspolna-stopka"></div>

  <!-- Skrypt pobierający menu i stopkę -->
  <script>
    // Ładowanie nagłówka
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('wspolny-naglowek').innerHTML = data;
      });

    // Ładowanie stopki
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('wspolna-stopka').innerHTML = data;
      });
  </script>

</body>
</html>
